services:
  icanhazallips:
    image: icanhazallips
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
    security_opt:
      - no-new-privileges
    read_only: true
    build:
      context: .
    networks:
      - haznet
    restart: unless-stopped
    entrypoint: ["/icanhazallips/icanhazallips"]
    cap_drop:
      - ALL
    environment:
      - APP_ADDR=:8080
      - APP_CONTEXT_TIMEOUT=10
      - APP_READ_HEADER_TIMEOUT=3
      - APP_READ_TIMEOUT=5
      - APP_WRITE_TIMEOUT=5
      - APP_IDLE_TIMEOUT=5
    user: "65532:65532"
  nginx:
    image: haz_nginx
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
    security_opt:
      - no-new-privileges
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=64m
      - /run:rw,noexec,nosuid,size=16m
    read_only: true
    build:
      context: .
      dockerfile: Dockerfile_nginx
    ports:
      - "9380:443"
    networks:
      - haznet
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
networks:
  haznet:
    enable_ipv6: true
    driver: bridge
